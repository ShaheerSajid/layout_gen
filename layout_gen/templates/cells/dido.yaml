# layout_gen cell topology template — SRAM DIDO column peripheral (stacked)
#
# Vertical multi-row layout for column-width-constrained placement.
# Each row pair has ≤ 2 abutting transistors per tier (~1.17 µm wide),
# fitting within a typical bit cell column pitch (~1.5 µm).
#
# Diffusion sharing (sd_flip):
#   Row 0: N_PB(flip)+N_PD share VSS, P_PB(flip)+P_PD share VDD
#   Row 1: N_SB(flip)+N_SI share VSS, P_SB(flip)+P_SI share VDD
#   Row 2: N_NA+N_NB share nd15 (series stack), P_NA+P_NB(flip) share net1
#   Row 3: N_NT + P_NT (single devices, gate bridge)
#   Row 4: P_PC0+P_PC1 share BL_ (PMOS only)
#   Row 5: P_PC2 alone (PMOS only)
#   Row 6: P_RP0 alone (PMOS only, read BL_)
#   Row 7: P_RP1 alone (PMOS only, read BL)
#   Row 8: N_WP0 alone (NMOS only, write BL)
#   Row 9: N_WP1 alone (NMOS only, write BL_)

name: dido
version: "2.0"
description: SRAM column peripheral — precharge, column select, read/write pass (stacked)

# ── Device instances ─────────────────────────────────────────────────────────
devices:
  # PCHG buffer inverter
  N_PB:  {template: planar_mosfet, type: nmos, terminals: {G: PCHG, D: net5, S: VSS}}
  P_PB:  {template: planar_mosfet, type: pmos, terminals: {G: PCHG, D: net5, S: VDD}}

  # PCHG driver inverter
  N_PD:  {template: planar_mosfet, type: nmos, terminals: {G: net5, D: net6, S: VSS}}
  P_PD:  {template: planar_mosfet, type: pmos, terminals: {G: net5, D: net6, S: VDD}}

  # Precharge PMOS (net6-gated, PMOS only)
  P_PC0: {template: planar_mosfet, type: pmos, terminals: {G: net6, D: BL_,  S: VDD}}
  P_PC1: {template: planar_mosfet, type: pmos, terminals: {G: net6, D: BL,   S: BL_}}
  P_PC2: {template: planar_mosfet, type: pmos, terminals: {G: net6, D: BL,   S: VDD}}

  # Column select buffer
  N_SB:  {template: planar_mosfet, type: nmos, terminals: {G: SEL, D: net4, S: VSS}}
  P_SB:  {template: planar_mosfet, type: pmos, terminals: {G: SEL, D: net4, S: VDD}}

  # Column select inverter
  N_SI:  {template: planar_mosfet, type: nmos, terminals: {G: net4, D: net3, S: VSS}}
  P_SI:  {template: planar_mosfet, type: pmos, terminals: {G: net4, D: net3, S: VDD}}

  # Read pass PMOS (net4-gated, PMOS only)
  P_RP0: {template: planar_mosfet, type: pmos, terminals: {G: net4, D: BL_,  S: DR_}}
  P_RP1: {template: planar_mosfet, type: pmos, terminals: {G: net4, D: DR,   S: BL}}

  # Write-enable NAND2 (flattened X15): net1 = !(net3 & WREN)
  N_NA:  {template: planar_mosfet, type: nmos, terminals: {G: net3, D: nd15, S: VSS}}
  N_NB:  {template: planar_mosfet, type: nmos, terminals: {G: WREN, D: net1, S: nd15}}
  P_NA:  {template: planar_mosfet, type: pmos, terminals: {G: net3, D: net1, S: VDD}}
  P_NB:  {template: planar_mosfet, type: pmos, terminals: {G: WREN, D: net1, S: VDD}}

  # Write data NOT (flattened X16): net2 = !net1
  N_NT:  {template: planar_mosfet, type: nmos, terminals: {G: net1, D: net2, S: VSS}}
  P_NT:  {template: planar_mosfet, type: pmos, terminals: {G: net1, D: net2, S: VDD}}

  # Write pass NMOS (net2-gated, NMOS only)
  N_WP0: {template: planar_mosfet, type: nmos, terminals: {G: net2, D: BL,   S: DW}}
  N_WP1: {template: planar_mosfet, type: nmos, terminals: {G: net2, D: DW_,  S: BL_}}

# ── Nets ────────────────────────────────────────────────────────────────────
nets: [VDD, VSS, PCHG, WREN, SEL, BL, BL_, DW, DW_, DR, DR_,
       net1, net2, net3, net4, net5, net6, nd15]

# ── Floorplan constraints ───────────────────────────────────────────────────
floorplan:
  layout_mode: stacked

  row_pairs:
    # Row 0: PCHG buffer + driver inverters
    - id: 0
      nmos: [N_PB, N_PD]
      pmos: [P_PB, P_PD]
      sd_flip: {N_PB: true, P_PB: true}

    # Row 1: Column select buffer + inverter
    - id: 1
      nmos: [N_SB, N_SI]
      pmos: [P_SB, P_SI]
      sd_flip: {N_SB: true, P_SB: true}

    # Row 2: NAND2 gate
    - id: 2
      nmos: [N_NA, N_NB]
      pmos: [P_NA, P_NB]
      sd_flip: {P_NB: true}

    # Row 3: NOT gate (buffer for write enable)
    - id: 3
      nmos: [N_NT]
      pmos: [P_NT]

    # Row 4: Precharge part 1 (PMOS only — P_PC0·P_PC1 share BL_)
    - id: 4
      nmos: []
      pmos: [P_PC0, P_PC1]

    # Row 5: Precharge part 2 (PMOS only)
    - id: 5
      nmos: []
      pmos: [P_PC2]

    # Row 6: Read pass BL_ (PMOS only)
    - id: 6
      nmos: []
      pmos: [P_RP0]

    # Row 7: Read pass BL (PMOS only)
    - id: 7
      nmos: []
      pmos: [P_RP1]

    # Row 8: Write pass BL (NMOS only)
    - id: 8
      nmos: [N_WP0]
      pmos: []

    # Row 9: Write pass BL_ (NMOS only)
    - id: 9
      nmos: [N_WP1]
      pmos: []

  # ── Named constraints ─────────────────────────────────────────────────
  inter_cell_gap:
    min: "rules.diff.spacing_min_um - 2*rules.poly.endcap_over_diff_um + 2*rules.diff.extension_past_poly_um"

  inter_row_gap: "rules.diff.spacing_min_um"

# ── Routing ─────────────────────────────────────────────────────────────────
routing:
  # ── Within-row-pair gate bridges (poly N↔P) ──
  - net:   PCHG
    style: shared_gate_poly
    layer: poly
    path:  [N_PB.G, P_PB.G]
  - net:   net5
    style: shared_gate_poly
    layer: poly
    path:  [N_PD.G, P_PD.G]
  - net:   SEL
    style: shared_gate_poly
    layer: poly
    path:  [N_SB.G, P_SB.G]
  - net:   net4
    style: shared_gate_poly
    layer: poly
    path:  [N_SI.G, P_SI.G]
  - net:   net3
    style: shared_gate_poly
    layer: poly
    path:  [N_NA.G, P_NA.G]
  - net:   WREN
    style: shared_gate_poly
    layer: poly
    path:  [N_NB.G, P_NB.G]
  - net:   net1
    style: shared_gate_poly
    layer: poly
    path:  [N_NT.G, P_NT.G]

  # ── Within-row-pair drain bridges (vertical li1 N↔P) ──
  - net:   net5
    style: drain_bridge
    layer: li1
    path:  [N_PB.D, P_PB.D]
  - net:   net6
    style: drain_bridge
    layer: li1
    path:  [N_PD.D, P_PD.D]
  - net:   net4
    style: drain_bridge
    layer: li1
    path:  [N_SB.D, P_SB.D]
  - net:   net3
    style: drain_bridge
    layer: li1
    path:  [N_SI.D, P_SI.D]
  - net:   net1
    style: drain_bridge
    layer: li1
    path:  [N_NB.D, P_NB.D]
  - net:   net2
    style: drain_bridge
    layer: li1
    path:  [N_NT.D, P_NT.D]

  # ── Internal bridges ──
  # nd15: NAND2 NMOS series stack (abutting diffusion)
  - net:   nd15
    style: li1_bridge
    layer: li1
    path:  [N_NA.D, N_NB.S]

  # net1: NAND2 PMOS parallel drains
  - net:   net1
    style: li1_bridge
    layer: li1
    path:  [P_NA.D, P_NB.D]

  # ── I/O terminal ports ──
  - net:   BL
    style: expose_terminal
    layer: li1
    path:  [P_PC1.D]
    location_key: BL_port
    orientation: 0

  - net:   BL_
    style: expose_terminal
    layer: li1
    path:  [P_PC0.D]
    location_key: BL__port
    orientation: 180

  - net:   DR
    style: expose_terminal
    layer: li1
    path:  [P_RP1.D]
    location_key: DR_port
    orientation: 0

  - net:   DR_
    style: expose_terminal
    layer: li1
    path:  [P_RP0.S]
    location_key: DR__port
    orientation: 180

  - net:   DW
    style: expose_terminal
    layer: li1
    path:  [N_WP0.S]
    location_key: DW_port
    orientation: 270

  - net:   DW_
    style: expose_terminal
    layer: li1
    path:  [N_WP1.D]
    location_key: DW__port
    orientation: 270

  # ── Power rails ──
  - net:   VSS
    style: horizontal_power_rail
    layer: met1
    edge:  bottom
  - net:   VDD
    style: horizontal_power_rail
    layer: met1
    edge:  top

# ── Output ports ────────────────────────────────────────────────────────────
ports:
  PCHG: {layer: poly, location: PCHG_gate_left_edge_mid_y}
  SEL:  {layer: poly, location: SEL_gate_left_edge_mid_y}
  WREN: {layer: poly, location: WREN_gate_left_edge_mid_y}
  BL:   {layer: li1,  location: BL_port}
  BL_:  {layer: li1,  location: BL__port}
  DR:   {layer: li1,  location: DR_port}
  DR_:  {layer: li1,  location: DR__port}
  DW:   {layer: li1,  location: DW_port}
  DW_:  {layer: li1,  location: DW__port}
  VDD:  {layer: met1, location: top_rail_center}
  VSS:  {layer: met1, location: bottom_rail_center}
