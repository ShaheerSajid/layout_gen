# layout_gen cell topology template — SRAM row driver
#
# B = A & WLEN  (NAND2 gate-qualified enable followed by high-drive inverter)
# Implements:  net1 = NAND2(A, WLEN),  B = NOT(net1)
#
# Zero routing directives.  Auto-router infers gate bridges, drain bridges,
# li1 bridges (net1 abutment, Y_nd parallel drains, Y_nd-to-INV gate),
# and power rails from device connectivity.

name: row_driver
description: SRAM row driver — NAND2(A, WLEN) followed by high-drive inverter

devices:
  # NAND2 stage
  N_A:   {template: planar_mosfet, type: nmos, terminals: {G: A,    D: net1, S: GND}}
  N_WL:  {template: planar_mosfet, type: nmos, terminals: {G: WLEN, D: Y_nd, S: net1}}
  P_A:   {template: planar_mosfet, type: pmos, terminals: {G: A,    D: Y_nd, S: VDD}}
  P_WL:  {template: planar_mosfet, type: pmos, terminals: {G: WLEN, D: Y_nd, S: VDD}}

  # Output inverter stage (wider PMOS for drive strength)
  N_INV: {template: planar_mosfet, type: nmos, terminals: {G: Y_nd, D: B, S: GND}}
  P_INV: {template: planar_mosfet, type: pmos, terminals: {G: Y_nd, D: B, S: VDD}, fingers: 4}

nets:
  VDD:  {type: power, rail: top}
  GND:  {type: power, rail: bottom}
  A:    {type: signal}
  WLEN: {type: signal}
  B:    {type: signal}
  Y_nd: {type: internal}
  net1: {type: internal}

placement:
  mode: standard
  pairs:
    - nmos: [N_A, N_WL, N_INV]
      pmos: [P_A, P_WL, P_INV]
  constraints:
    inter_cell_gap:
      min: "rules.diff.spacing_min_um - 2*rules.poly.endcap_over_diff_um + 2*rules.diff.extension_past_poly_um"

ports:
  A:    {side: west}
  WLEN: {side: west}
  B:    {side: east}
  GND:  {side: south}
  VDD:  {side: north}
