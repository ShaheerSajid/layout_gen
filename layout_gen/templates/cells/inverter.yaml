# layout_gen cell topology template — CMOS inverter
#
# Zero routing directives.  The auto-router infers poly bridge, drain
# bridge, and power rails from device connectivity and net types.

name: cmos_inverter
description: Single-stage CMOS inverter (1 NMOS + 1 PMOS, shared gate)

devices:
  N: {template: planar_mosfet, type: nmos, terminals: {G: IN, D: OUT, S: GND}}
  P: {template: planar_mosfet, type: pmos, terminals: {G: IN, D: OUT, S: VDD}}

nets:
  VDD: {type: power, rail: top}
  GND: {type: power, rail: bottom}
  IN:  {type: signal}
  OUT: {type: signal}

placement:
  mode: standard
  pairs:
    - nmos: [N]
      pmos: [P]
  constraints:
    inter_cell_gap:
      min: "rules.diff.spacing_min_um - 2*rules.poly.endcap_over_diff_um + 2*rules.diff.extension_past_poly_um"

ports:
  IN:  {side: west}
  OUT: {side: east}
  GND: {side: south}
  VDD: {side: north}
