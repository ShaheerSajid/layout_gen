[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "layout_gen"
version = "0.1.0"
description = "Parametric SRAM cell layout generation with DRC-aware repair"
requires-python = ">=3.10"
dependencies = [
    "gdsfactory>=7.0",
    "klayout>=0.28",
]

[project.optional-dependencies]
ml = [
    "torch>=2.0",
    "torch-geometric",
    "scikit-learn",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["layout_gen*"]
